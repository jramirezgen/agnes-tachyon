name: ci

on:
  push:
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package metadata
        run: python -m pip install --upgrade pip && python -m pip install -e . --no-deps pytest

      - name: CLI version smoke test
        run: python -m tachyon version

      - name: Run lightweight tests
        run: pytest tests/test_cli.py
